<div class="auth-wrapper">
  <div class="auth-card card-glass">
    <h1 class="auth-title">Đăng ký tài khoản</h1>
    <p class="auth-subtitle">Tạo tài khoản để theo dõi truyện yêu thích của bạn</p>

    <div *ngIf="errorMsg" class="error-alert">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username" class="form-label">Tên đăng nhập</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" required class="input-field" placeholder="Nhập tên đăng nhập...">
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Địa chỉ Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required email class="input-field" placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mật khẩu</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required class="input-field" placeholder="Tối thiểu 6 ký tự...">
      </div>

      <button type="submit" [disabled]="!registerForm.form.valid || isLoading" class="btn-primary auth-btn">
        {{ isLoading ? 'Đang xử lý...' : 'Đăng ký' }}
      </button>
    </form>

    <p class="auth-footer">
      Đã có tài khoản? <a routerLink="/login" class="auth-link">Đăng nhập</a>
    </p>
  </div>
</div>
