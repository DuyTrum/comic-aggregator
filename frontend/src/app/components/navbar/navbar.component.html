<header *ngIf="!isReaderPage()" class="navbar-container">
  <div class="nav-content">
    <a routerLink="/" class="logo-link">
      <span class="material-symbols-outlined logo-icon-svg">bolt</span>
      <span class="logo-text">Comic<span class="highlight">Aggregator</span></span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="material-symbols-outlined nav-icon">explore</span>
        <span>Khám phá</span>
      </a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/library" class="nav-link" routerLinkActive="active">
        <span class="material-symbols-outlined nav-icon">auto_stories</span>
        <span>Thư viện</span>
      </a>
      <a routerLink="/history" class="nav-link" routerLinkActive="active">
        <span class="material-symbols-outlined nav-icon">history</span>
        <span>Lịch sử</span>
      </a>
      <a routerLink="/downloads" class="nav-link" routerLinkActive="active">
        <span class="material-symbols-outlined nav-icon">download</span>
        <span>Đã tải</span>
      </a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/analytics" class="nav-link" routerLinkActive="active">
        <span class="material-symbols-outlined nav-icon">monitoring</span>
        <span>Thống kê</span>
      </a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin" class="nav-link admin-link" routerLinkActive="active">
        <span class="material-symbols-outlined nav-icon">settings</span>
        <span>Quản trị</span>
      </a>
    </nav>

    <div class="nav-actions">
      <ng-container *ngIf="authService.isAuthenticated(); else guestTpl">
        <span class="user-greeting">Hi, <strong>{{ authService.currentUser()?.username }}</strong></span>
        <button (click)="logout()" class="btn-secondary">Đăng xuất</button>
      </ng-container>
      <ng-template #guestTpl>
        <a routerLink="/login" class="btn-secondary">Đăng nhập</a>
        <a routerLink="/register" class="btn-primary">Đăng ký</a>
      </ng-template>
    </div>
  </div>
</header>
